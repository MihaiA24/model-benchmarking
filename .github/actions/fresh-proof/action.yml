name: Publish fresh authoritative proof
description: Execute one exact gate and publish its immutable current proof.

inputs:
  token:
    description: GitHub token with actions:read and checks:write permissions.
    required: true
  gate-id:
    description: Policy-declared fresh authoritative gate ID.
    required: true
  candidate-sha:
    description: Exact checked-out candidate commit SHA.
    required: true
  requester:
    description: Authorized requester identity.
    required: true
  reason:
    description: Auditable reason for the fresh run.
    required: true
  worker-class:
    description: Policy-authorized worker class.
    required: true
  worker-identity:
    description: Configured runner or qualification signing identity.
    required: true
  docker-daemon:
    description: Docker daemon identity for Docker-required gates.
    required: false
    default: ""

outputs:
  artifact-id:
    description: Immutable GitHub Actions artifact ID.
    value: ${{ steps.finalize.outputs.artifact-id }}
  envelope-sha256:
    description: Uploaded proof envelope SHA-256 digest.
    value: ${{ steps.finalize.outputs.envelope-sha256 }}
  generation-id:
    description: Fresh proof generation UUID.
    value: ${{ steps.prepare.outputs.generation-id }}
  proof-pointer:
    description: Check Run external proof pointer.
    value: ${{ steps.finalize.outputs.proof-pointer }}

runs:
  using: composite
  steps:
    - name: Prepare exact gate and immutable bundle
      id: prepare
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        GATE_ID: ${{ inputs.gate-id }}
        CANDIDATE_SHA: ${{ inputs.candidate-sha }}
        REQUESTER: ${{ inputs.requester }}
        REASON: ${{ inputs.reason }}
        WORKER_CLASS: ${{ inputs.worker-class }}
        WORKER_IDENTITY: ${{ inputs.worker-identity }}
        DOCKER_DAEMON: ${{ inputs.docker-daemon }}
      run: >-
        python scripts/verify.py prepare-proof
        --gate "$GATE_ID"
        --candidate-sha "$CANDIDATE_SHA"
        --requester "$REQUESTER"
        --reason "$REASON"
        --worker-class "$WORKER_CLASS"
        --worker-identity "$WORKER_IDENTITY"
        --docker-daemon "$DOCKER_DAEMON"
        --publication-root "$RUNNER_TEMP/model-benchmark-fresh-proofs"
        --state "$RUNNER_TEMP/fresh-proof-state-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT-$GATE_ID.json"
        --github-output "$GITHUB_OUTPUT"

    - name: Upload immutable proof bundle
      id: upload
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: ${{ steps.prepare.outputs.artifact-name }}
        path: ${{ steps.prepare.outputs.bundle-path }}
        compression-level: 0
        if-no-files-found: error
        include-hidden-files: true
        overwrite: false

    - name: Read back artifact and complete Check Run
      id: finalize
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
        ARTIFACT_DIGEST: ${{ steps.upload.outputs.artifact-digest }}
        STATE_PATH: ${{ steps.prepare.outputs.state-path }}
      run: >-
        python scripts/verify.py finalize-proof
        --state "$STATE_PATH"
        --artifact-id "$ARTIFACT_ID"
        --artifact-digest "$ARTIFACT_DIGEST"
        --github-output "$GITHUB_OUTPUT"

    - name: Record failed publication
      if: ${{ failure() && steps.prepare.outcome == 'success' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        STATE_PATH: ${{ steps.prepare.outputs.state-path }}
      run: >-
        python scripts/verify.py fail-proof
        --state "$STATE_PATH"
        --failure-reason "Composite publication failed before confirmed read-back success"
