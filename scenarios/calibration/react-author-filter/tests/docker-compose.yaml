services:
  main:
    build:
      context: .
      dockerfile: Dockerfile
    cap_drop:
    - ALL
    network_mode: none
    pids_limit: 128
    read_only: true
    security_opt:
    - no-new-privileges:true
    tmpfs:
    - /tmp:rw,noexec,nosuid,nodev,size=64m
    volumes:
    - evaluator-repository:/evaluator-repository
    - evaluator-request:/evaluator-request
    - evaluator-result:/evaluator-result
  evaluator:
    build:
      context: .
      dockerfile: evaluator/Dockerfile
    cap_drop:
    - ALL
    cpus: 1.0
    depends_on:
      main:
        condition: service_started
    mem_limit: 256m
    network_mode: none
    pids_limit: 64
    read_only: true
    restart: "no"
    security_opt:
    - no-new-privileges:true
    tmpfs:
    - /tmp:rw,noexec,nosuid,nodev,size=16m
    user: "65532:65532"
    volumes:
    - evaluator-repository:/repository:ro
    - evaluator-request:/request:ro
    - evaluator-result:/result
volumes:
  evaluator-repository: null
  evaluator-request: null
  evaluator-result: null
